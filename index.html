    <main>
      <div class="px-7">
        <div id="map" class=" max-w-250 mx-auto h-[500px] rounded-lg border-2 border-blue-500 justify-center z-0 mt-10   relative shadow-lg/20">
          <button class="absolute top-2.5 right-2 z-1001 bg-white  rounded-md shadow-md w-17 h-7 border-1 text-sm ">
          PM2.5
          </button>
        </div>

        <script>
        // 1. ตั้งค่าเริ่มต้นแผนที่
        var map = L.map('map').setView([14.106070, 100.984210], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Group สำหรับเก็บหมุดเพื่อลบและสร้างใหม่ได้ง่าย
        var markerGroup = L.layerGroup().addTo(map);

        // 2. ฟังก์ชันเลือกสีหมุดตามค่าฝุ่น
        function getMarkerColor(val) {
            if (val <= 25) return 'bg-safe';
            if (val <= 50) return 'bg-warning';
            return 'bg-danger';
        }

        // 3. ฟังก์ชันดึงข้อมูลจาก n8n
        async function updateData() {
            const statusEl = document.getElementById('status-msg');

            try {
                // เปลี่ยน URL นี้ให้ตรงกับ n8n Webhook ของคุณ
                const response = await fetch('http://localhost:5678/webhook-test/get-pm25');
                
                if (!response.ok) throw new Error('ติดต่อ Webhook ไม่ได้');

                const data = await response.json();
                console.log("Data from Supabase via n8n:", data);

                // ล้างหมุดเก่าออกก่อนปักใหม่
                markerGroup.clearLayers();

                // รองรับข้อมูลทั้งแบบชิ้นเดียว หรือแบบหลายชิ้น (Array)
                const items = Array.isArray(data) ? data : [data];

                // --- เริ่มแก้ตั้งแต่บรรทัดนี้ (ในส่วน items.forEach) ---
                items.forEach(item => {
                    const val = item.pm25; // ดึงเลข 49 จาก JSON ของคุณ
                    
                    // บรรทัดนี้สำคัญ: เพราะ JSON ของคุณไม่มี lat/lng 
                    // เราเลยต้องกำหนดพิกัดให้มันก่อน (หรือดึงจาก item.lat ถ้าในอนาคตมี)
                    const lat = item.lat || 14.102328; 
                    const lng = item.lng || 100.983268;

                    if (val !== undefined) {
                        const colorClass = getMarkerColor(val);

                        const customIcon = L.divIcon({
                            className: '',
                            html: `<div class="marker-pin ${colorClass} transition-all duration-700">
                                    <span>${val}</span>
                                  </div>`,
                            iconSize: [30, 42],
                            iconAnchor: [15, 42]
                        });

                        // ปักหมุดโดยใช้ค่า lat, lng ที่เรากำหนดไว้ข้างบน
                        L.marker([lat, lng], { icon: customIcon })
                            .addTo(markerGroup)
                            .bindPopup(`<b>เสา: ${item.pole_id}</b><br>PM2.5: ${val}`);
                        
                        // บรรทัดเสริม: สั่งให้แผนที่วิ่งไปหาหมุดอัตโนมัติ
                        map.panTo([lat, lng]);
                    }
                });
                // --- จบส่วนที่แก้ ---

                statusEl.innerText = "อัปเดตเมื่อ: " + new Date().toLocaleTimeString();
                statusEl.classList.replace('text-red-500', 'text-blue-600');

            } catch (error) {
                console.error("Error fetching data:", error);
                statusEl.innerText = "Error: เชื่อมต่อ Webhook ไม่สำเร็จ";
                statusEl.classList.add('text-red-500');
            }
        }

        // เริ่มทำงานครั้งแรกทันที
        updateData();

        // ตั้งเวลาอัปเดตทุก 60 วินาที
        setInterval(updateData, 60000);
    </script>
