     <script>
        // 1. ตั้งค่าแผนที่
        var map = L.map('map').setView([13.932015, 100.821451], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var markerGroup = L.layerGroup().addTo(map);

        function getMarkerColor(val) {
            if (val <= 25) return 'bg-safe';
            if (val <= 50) return 'bg-warning';
            return 'bg-danger';
        }

        async function updateData() {
            try {
                const response = await fetch('http://localhost:5678/webhook/get-pm25?t=' + Date.now());
                if (!response.ok) throw new Error('Network response was not ok');
                const rawData = await response.json();
                
                console.log("Data Received:", rawData);
                const now = new Date();
                const timeString = now.toLocaleTimeString('th-TH', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
        document.getElementById('last-update').innerText = timeString;
                
                markerGroup.clearLayers();
                let items = Array.isArray(rawData) ? rawData : [rawData];

                items.forEach((item) => {
                    const pid = item.pole_id;
                    
                    // หาเลขท้ายเสา (รองรับทั้ง Pole-02, Pole-2, Pole-03, Pole-3)
                    let num = "";
                    if (pid.includes("1")) num = "1";
                    else if (pid.includes("2")) num = "2";
                    else if (pid.includes("3")) num = "3";

                    // --- อัปเดตตัวเลขใน Dashboard ---
                    if (num !== "") {
                        const sensorMap = {
                            [`pm25-pole${num}`]: item.pm25,
                            [`pm10-pole${num}`]: item.pm10,
                            [`co2-pole${num}`]: item.co2,
                            [`tvoc-pole${num}`]: item.tvoc,
                            [`ch2o-pole${num}`]: item.ch2o,
                            [`temp-pole${num}`]: item.temp,
                            [`hum-pole${num}`]: item.hum
                        };

                        for (const [id, value] of Object.entries(sensorMap)) {
                            const el = document.getElementById(id);
                            if (el) {
                                el.innerText = (value !== undefined && value !== null) ? value : '--';
                                
                                // ใส่สีเฉพาะ PM 2.5
                                if (id.startsWith('pm25-') && value !== undefined) {
                                    if (value <= 25) el.className = "text-2xl font-black text-green-500";
                                    else if (value <= 50) el.className = "text-2xl font-black text-yellow-500";
                                    else el.className = "text-2xl font-black text-red-500";
                                }
                            }
                        }
                    }

                    // --- วางหมุดบนแผนที่ ---
                    let lat, lng, label;
                    if (pid.includes("3")) {
                        lat = 13.692829; lng = 100.413299; label = "ริมรั้ว (Pole-03)";
                    } else if (pid.includes("2")) {
                        lat = 13.692859; lng = 100.412915; label = "สนาม (Pole-02)";
                    } else if (pid.includes("1")) {
                        lat = 14.102262; lng = 100.983474; label = "บริเวณตึกภาคเครื่องกล (Pole-01)";
                    }

                    if (item.pm25 !== undefined && lat && lng) {
                        const colorClass = getMarkerColor(item.pm25);
                        const customIcon = L.divIcon({
                            className: '',
                            html: `<div class="marker-pin ${colorClass}"><span>${item.pm25}</span></div>`,
                            iconSize: [30, 42],
                            iconAnchor: [15, 42]
                        });
                        L.marker([lat, lng], { icon: customIcon }).addTo(markerGroup).bindPopup(`<b>${label}</b><br>PM2.5: ${item.pm25}`);
                    }
                });

            } catch (error) {
                console.error("Fetch Error:", error);
            }
        }

        updateData();
        setInterval(updateData, 1800000); // อัปเดตทุก 30 นาที
    </script>
