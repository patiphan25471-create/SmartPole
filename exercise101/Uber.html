<!DOCTYPE html>
<html>
  <head>
    <link href="./dist/output.css" rel="stylesheet">
    <title>Uber Page</title>
  </head>
  <body>
    <p class="text-4xl font-bold mt-8 ml-4">
      Request a ride now
    </p>
    <input type="text" placeholder="Enter pickup location" class="ml-4 border-2 w-97 mt-4 mb-2 px-4 py-2 bg-gray-100" />
    <input type="text" placeholder="Enter destination" class="ml-4 border-2 w-97 mt-0.1 mb-2 px-4 py-2 block bg-gray-100" />
    <button class="bg-black text-white px-4 py-2 rounded ml-4 mt-4 cursor-pointer hover:opacity-90 active:opacity-70 transition duration-100">
      Request now
    </button>
    <button class="bg-black  px-4 py-2 rounded ml-4 mt-4 cursor-pointer hover:opacity-90 active:opacity-70 transition duration-100 bg-gray-200 ">
      Schedule for later
    </button>
  </body>
</html>
