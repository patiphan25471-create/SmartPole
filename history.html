<!DOCTYPE html>
<html>
  <head>
    <link href="./dist/output.css" rel="stylesheet">
    <title>My Website</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100..700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: "Anuphan", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
      }
    </style>
  </head>

  <body class="bg-sky-50">
    <header class="sticky top-0 z-50 w-full h-16 bg-white/80 backdrop-blur-md border-b-2 border-gray-400 flex shadow-lg">
      <div class="h-full px-10 flex items-center shrink-0">
        My LOGO
      </div>

      <div class="flex-1"></div>

      <nav class="hidden min-[800px]:flex h-full">
        <a href="index.html" class="flex items-center px-10 justify-center cursor-pointer hover:bg-gray-300 transition">หน้าแรก</a>
        <a href="list.html" class="flex items-center px-10 justify-center cursor-pointer hover:bg-gray-300 transition">รายการ</a>
        <a href="history.html" class="flex items-center px-10 justify-center cursor-pointer underline underline-offset-1 hover:bg-gray-300 transition">ดูข้อมูลย้อนหลัง</a>
        <a href="predict.html" class="flex items-center px-10 justify-center cursor-pointer hover:bg-gray-300 transition">เกี่ยวกับเรา</a>
      </nav>

      <button class="flex min-[800px]:hidden items-center px-6 hover:bg-gray-100 transition" onclick="toggleMenu()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
        </svg>
      </button>
      <div id="mobile-menu" class="hidden fixed top-16 left-0 z-40 w-full bg-white border-b-2 border-gray-400 shadow-lg min-[800px]:hidden">
        <div class="flex flex-col">
          <a href="index.html" class="p-4 hover:bg-gray-200 transition">หน้าแรก</a>
          <a href="list.html" class="p-4 hover:bg-gray-200 transition">รายการ</a>
          <a href="history.html" class="p-4 hover:bg-gray-200 transition">ดูข้อมูลย้อนหลัง</a>
          <a href="predict.html" class="p-4 hover:bg-gray-200 transition">เกี่ยวกับเรา</a>
        </div>
      </div>
    </header>
    
    <main class="max-w-6xl mx-auto p-6 md:p-10">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <h1 class="text-2xl font-black text-slate-800">📊 วิเคราะห์ข้อมูลย้อนหลัง</h1>
            
            <div class="flex flex-wrap gap-3">
                <select id="poleSelect" class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="Pole1">Pole-01 (ตำแหน่ง 1)</option>
                    <option value="Pole2">Pole-02 (สนาม)</option>
                    <option value="Pole3">Pole-03 (ริมรั้ว)</option>
                </select>
                <select id="rangeSelect" class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="1">24 ชั่วโมงล่าสุด</option>
                    <option value="7" selected>7 วันล่าสุด</option>
                    <option value="30">30 วันล่าสุด</option>
                </select>
                <button onclick="updateHistory()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-all active:scale-95">
                    เรียกดูข้อมูล
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">ค่าเฉลี่ย PM2.5</p>
                <div class="flex items-baseline gap-2 mt-2">
                    <span id="avg-val" class="text-4xl font-black text-slate-800">--</span>
                    <span class="text-gray-400 text-sm">µg/m³</span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-red-500">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">สูงสุด (MAX)</p>
                <div class="flex items-baseline gap-2 mt-2">
                    <span id="max-val" class="text-4xl font-black text-red-600">--</span>
                    <span class="text-gray-400 text-sm">µg/m³</span>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">ต่ำสุด (MIN)</p>
                <div class="flex items-baseline gap-2 mt-2">
                    <span id="min-val" class="text-4xl font-black text-green-600">--</span>
                    <span class="text-gray-400 text-sm">µg/m³</span>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">
                    <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
                    กราฟแสดงแนวโน้มค่าฝุ่น
                </h2>
                <span class="text-xs text-gray-400">* ข้อมูลอัปเดตทุก 30 นาที</span>
            </div>
            <div class="relative h-[450px] w-full">
                <canvas id="chartHistory"></canvas>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        let myChart = null;

        async function updateHistory() {
            const pole = document.getElementById('poleSelect').value;
            const days = document.getElementById('rangeSelect').value;
            const btn = document.querySelector('button');

            btn.innerText = "กำลังโหลด...";
            btn.disabled = true;

            try {
                // แก้ไข URL: ส่งค่า pole และ days ไปยัง n8n Webhook
                const url = `http://localhost:5678/webhook/get-history?pole=${pole}&days=${days}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data || data.length === 0) {
                    alert("ไม่พบข้อมูลในช่วงเวลาดังกล่าว");
                    // ล้างค่าเก่าออกถ้าไม่เจอข้อมูล
                    document.getElementById('avg-val').innerText = "--";
                    document.getElementById('max-val').innerText = "--";
                    document.getElementById('min-val').innerText = "--";
                    if (myChart) myChart.destroy();
                    return;
                }

                // 1. ประมวลผลข้อมูลสถิติ (รองรับทั้ง pm25 และ PM25)
                const pmValues = data.map(item => Number(item.pm25 || item.PM25 || 0));
                const max = Math.max(...pmValues);
                const min = Math.min(...pmValues);
                const avg = (pmValues.reduce((a, b) => a + b, 0) / pmValues.length).toFixed(1);

                document.getElementById('avg-val').innerText = avg;
                document.getElementById('max-val').innerText = max;
                document.getElementById('min-val').innerText = min;

                // 2. จัดการกราฟ
                const ctx = document.getElementById('chartHistory').getContext('2d');
                if (myChart) myChart.destroy();

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(item => {
                            const date = new Date(item.created_at);
                            return date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + 
                                   (days > 1 ? ` (${date.getDate()} ${date.toLocaleDateString('th-TH', {month:'short'})})` : '');
                        }),
                        datasets: [{
                            label: `PM2.5 (${pole})`,
                            data: pmValues,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4,
                            pointRadius: data.length > 100 ? 0 : 3,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { intersect: false, mode: 'index' },
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { 
                                beginAtZero: true,
                                grid: { color: '#f1f5f9' },
                                title: { display: true, text: 'µg/m³' }
                            },
                            x: { 
                                grid: { display: false },
                                ticks: { maxRotation: 45, minRotation: 45 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("Fetch Error:", error);
                alert("ไม่สามารถดึงข้อมูลจาก Server ได้ (ตรวจสอบว่า n8n เปิดอยู่หรือไม่)");
            } finally {
                btn.innerText = "เรียกดูข้อมูล";
                btn.disabled = false;
            }
        }

        window.onload = updateHistory;
    </script>
</body>
</html>
